{% extends "base.html" %}
{% block title %}Sign In — FocusGuard{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand"><span class="logo-dot"></span> FocusGuard</div>
    <h2>Welcome back</h2>
    <p class="auth-sub">Sign in to continue your streak.</p>
    <form method="POST" class="auth-form">
      <div class="field-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="your_username" required autocomplete="username">
      </div>
      <div class="field-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>
    <p class="auth-link">New here? <a href="/register">Create an account</a></p>
  </div>
</div>
{% endblock %}
